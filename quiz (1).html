  <h1>Quick Quiz</h1>

  <p>What does HTML stand for?</p>

  <button onclick="checkAnswer('a')">HyperText Markup Language</button>
  <button onclick="checkAnswer('b')">High Tech Machine Learning</button>

  <p id="result"></p>

  <script>
    function checkAnswer(answer) {
      if (answer === 'a') {
        document.getElementById("result").innerHTML = "Correct!";
      } else {
        document.getElementById("result").innerHTML = "Wrong answer!";
      }
    }
  </script>
